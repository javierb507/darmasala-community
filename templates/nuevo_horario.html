{% extends "base.html" %}

{% block title %}Nuevo Horario{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-clock"></i> Nuevo Horario</h2>
                <a href="{{ url_for('classes.horarios') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Volver
                </a>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">
                        <i class="fas fa-plus"></i> Crear Nuevo Horario Semanal
                    </h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="clase_id" class="form-label">Clase *</label>
                                    <select class="form-select" id="clase_id" name="clase_id" required>
                                        <option value="">Seleccionar clase</option>
                                        {% for clase in clases %}
                                        <option value="{{ clase.id }}">{{ clase.nombre }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="dia_semana" class="form-label">Día de la Semana *</label>
                                    <select class="form-select" id="dia_semana" name="dia_semana" required>
                                        <option value="">Seleccionar día</option>
                                        <option value="0">Lunes</option>
                                        <option value="1">Martes</option>
                                        <option value="2">Miércoles</option>
                                        <option value="3">Jueves</option>
                                        <option value="4">Viernes</option>
                                        <option value="5">Sábado</option>
                                        <option value="6">Domingo</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="hora_inicio" class="form-label">Hora de Inicio *</label>
                                    <input type="time" class="form-control" id="hora_inicio" name="hora_inicio"
                                        required>
                                </div>

                                <div class="mb-3">
                                    <label for="hora_fin" class="form-label">Hora de Fin *</label>
                                    <input type="time" class="form-control" id="hora_fin" name="hora_fin" required>
                                </div>

                                <div class="mb-3">
                                    <label for="instructor" class="form-label">Instructor</label>
                                    <input type="text" class="form-control" id="instructor" name="instructor"
                                        value="Minouche">
                                </div>
                            </div>
                        </div>

                        <div class="row mt-4">
                            <div class="col-12">
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save"></i> Crear Horario
                                    </button>
                                    <a href="{{ url_for('classes.horarios') }}" class="btn btn-secondary">
                                        <i class="fas fa-times"></i> Cancelar
                                    </a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
