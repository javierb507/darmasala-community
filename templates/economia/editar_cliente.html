{% extends "base.html" %}

{% block title %}Editar Cliente - Facturación - Atma suddhi{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-gradient-premium text-white">
                <h4 class="mb-0"><i class="fas fa-user-edit me-2"></i> Editar Cliente de Facturación</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label for="nombre" class="form-label">Nombre/Razón Social *</label>
                            <input type="text" class="form-control" id="nombre" name="nombre"
                                value="{{ cliente.nombre }}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="nif_cif" class="form-label">NIF/CIF *</label>
                            <input type="text" class="form-control" id="nif_cif" name="nif_cif"
                                value="{{ cliente.nif_cif }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="tipo_cliente" class="form-label">Tipo de Cliente</label>
                        <select class="form-select" id="tipo_cliente" name="tipo_cliente">
                            <option value="particular" {% if cliente.tipo_cliente=='particular' %}selected{% endif %}>
                                Particular</option>
                            <option value="empresa" {% if cliente.tipo_cliente=='empresa' %}selected{% endif %}>Empresa
                            </option>
                            <option value="autonomo" {% if cliente.tipo_cliente=='autonomo' %}selected{% endif %}>
                                Autónomo</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="direccion" class="form-label">Dirección *</label>
                        <textarea class="form-control" id="direccion" name="direccion" rows="2"
                            required>{{ cliente.direccion }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="codigo_postal" class="form-label">Código Postal</label>
                            <input type="text" class="form-control" id="codigo_postal" name="codigo_postal"
                                value="{{ cliente.codigo_postal or '' }}">
                        </div>
                        <div class="col-md-5 mb-3">
                            <label for="ciudad" class="form-label">Ciudad</label>
                            <input type="text" class="form-control" id="ciudad" name="ciudad"
                                value="{{ cliente.ciudad or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="provincia" class="form-label">Provincia</label>
                            <input type="text" class="form-control" id="provincia" name="provincia"
                                value="{{ cliente.provincia or '' }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email"
                                value="{{ cliente.email or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telefono" class="form-label">Teléfono</label>
                            <input type="text" class="form-control" id="telefono" name="telefono"
                                value="{{ cliente.telefono or '' }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="alumno_id" class="form-label">Vincular con Alumno (opcional)</label>
                        <select class="form-select" id="alumno_id" name="alumno_id">
                            <option value="">-- Sin vincular --</option>
                            {% for alumno in alumnos %}
                            <option value="{{ alumno.id }}" {% if cliente.alumno_id==alumno.id %}selected{% endif %}>{{
                                alumno.nombre }} {{ alumno.apellido }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="notas" class="form-label">Notas</label>
                        <textarea class="form-control" id="notas" name="notas"
                            rows="3">{{ cliente.notas or '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('finance.clientes_facturacion') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-2"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-premium">
                            <i class="fas fa-save me-2"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
