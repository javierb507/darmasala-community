{% extends "base.html" %}

{% block title %}Agregar Pago - {{ alumno.nombre }} {{ alumno.apellido }} - DarmaSala{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-credit-card"></i> Agregar Pago - {{ alumno.nombre }} {{ alumno.apellido }}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="tipo_pago" class="form-label">Tipo de Pago *</label>
                        <select class="form-select" id="tipo_pago" name="tipo_pago" required>
                            <option value="cuota">Cuota mensual ({{ alumno.get_tipo_cuota_display() }} - €{{ "%.2f"|format(alumno.get_precio_cuota()) }})</option>
                            <option value="matricula">Matrícula {{ matricula_year }} (€25.00)</option>
                            <option value="clase_suelta">Clase suelta (€15.00)</option>
                            <option value="bono">Bono de clases</option>
                        </select>
                    </div>
                    
                    <div class="mb-3" id="mes-field">
                        <label for="mes" class="form-label">Mes *</label>
                        <input type="month" class="form-control" id="mes" name="mes" value="{{ current_year }}-09">
                    </div>
                    
                    <div class="mb-3" id="año-field" style="display: none;">
                        <label for="año" class="form-label">Año de Matrícula *</label>
                        <select class="form-select" id="año" name="año">
                            <option value="">Seleccionar año</option>
                            {% for año in range(current_year - 2, current_year + 3) %}
                            <option value="{{ año }}" {% if año == current_year %}selected{% endif %}>{{ año }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3" id="fecha-clase-field" style="display: none;">
                        <label for="fecha_clase" class="form-label">Fecha de la Clase *</label>
                        <input type="date" class="form-control" id="fecha_clase" name="fecha_clase">
                    </div>

                    <div id="bono-fields" style="display: none;">
                        <div class="mb-3">
                            <label for="bono_clases" class="form-label">Número de clases *</label>
                            <input type="number" class="form-control" id="bono_clases" name="bono_clases" value="10" min="1">
                        </div>
                        <div class="mb-3">
                            <label for="bono_caducidad" class="form-label">Caducidad (opcional)</label>
                            <input type="date" class="form-control" id="bono_caducidad" name="bono_caducidad">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="monto" class="form-label">Monto *</label>
                        <div class="input-group">
                            <span class="input-group-text">€</span>
                            <input type="number" class="form-control" id="monto" name="monto" 
                                   step="0.01" min="0" required placeholder="0.00" readonly>
                        </div>
                        <div class="form-text">El monto se calcula automáticamente según el tipo de pago</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="metodo_pago" class="form-label">Método de Pago</label>
                        <select class="form-select" id="metodo_pago" name="metodo_pago">
                            <option value="efectivo">Efectivo</option>
                            <option value="transferencia">Transferencia</option>
                            <option value="tarjeta">Tarjeta</option>
                            <option value="bizum">Bizum</option>
                        </select>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('students.ver_alumno', alumno_id=alumno.id) }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Registrar Pago
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const tipoPagoSelect = document.getElementById('tipo_pago');
    const montoInput = document.getElementById('monto');
    const mesField = document.getElementById('mes-field');
    const añoField = document.getElementById('año-field');
    const mesInput = document.getElementById('mes');
    const añoInput = document.getElementById('año');
    
    // Precios fijos
    const precios = {
        'cuota': {{ alumno.get_precio_cuota() }},
        'matricula': 25.00,
        'clase_suelta': 15.00
    };
    
    function actualizarMonto() {
        const tipoSeleccionado = tipoPagoSelect.value;
        if (tipoSeleccionado === 'bono') {
            // Para bonos el monto es libre: editable y sin precio fijo
            montoInput.readOnly = false;
            montoInput.value = '';
            return;
        }
        montoInput.readOnly = true;
        const precio = precios[tipoSeleccionado];
        montoInput.value = precio.toFixed(2);
    }

    function actualizarCampos() {
        const tipoSeleccionado = tipoPagoSelect.value;
        const fechaClaseField = document.getElementById('fecha-clase-field');
        const fechaClaseInput = document.getElementById('fecha_clase');
        const bonoFields = document.getElementById('bono-fields');
        const bonoClasesInput = document.getElementById('bono_clases');

        // Ocultar todos los campos primero
        mesField.style.display = 'none';
        añoField.style.display = 'none';
        fechaClaseField.style.display = 'none';
        bonoFields.style.display = 'none';

        // Resetear required
        mesInput.required = false;
        añoInput.required = false;
        fechaClaseInput.required = false;
        bonoClasesInput.required = false;

        // Mostrar el campo apropiado
        if (tipoSeleccionado === 'matricula') {
            añoField.style.display = 'block';
            añoInput.required = true;
        } else if (tipoSeleccionado === 'clase_suelta') {
            fechaClaseField.style.display = 'block';
            fechaClaseInput.required = true;
        } else if (tipoSeleccionado === 'bono') {
            bonoFields.style.display = 'block';
            bonoClasesInput.required = true;
        } else {
            mesField.style.display = 'block';
            mesInput.required = true;
        }
    }
    
    // Actualizar monto al cambiar el tipo de pago
    tipoPagoSelect.addEventListener('change', function() {
        actualizarMonto();
        actualizarCampos();
    });
    
    // Establecer estado inicial
    actualizarMonto();
    actualizarCampos();
});
</script>
{% endblock %}
