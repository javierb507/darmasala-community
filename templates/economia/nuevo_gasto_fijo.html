{% extends "base.html" %}

{% block title %}Nuevo Gasto Fijo - Atma suddhi{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-calendar-alt"></i> Nuevo Gasto Fijo</h2>
            <a href="{{ url_for('gastos_fijos') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Volver a Gastos Fijos
            </a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Configurar Gasto Recurrente</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre del Gasto *</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" 
                                       placeholder="Ej: Alquiler del local" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="importe" class="form-label">Importe *</label>
                                <div class="input-group">
                                    <input type="number" step="0.01" class="form-control" id="importe" name="importe" required>
                                    <span class="input-group-text">€</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="2" 
                                  placeholder="Descripción adicional del gasto..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="categoria_id" class="form-label">Categoría *</label>
                                <select class="form-select" id="categoria_id" name="categoria_id" required>
                                    <option value="">Seleccionar categoría...</option>
                                    {% for categoria in categorias %}
                                    <option value="{{ categoria.id }}">{{ categoria.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="frecuencia" class="form-label">Frecuencia *</label>
                                <select class="form-select" id="frecuencia" name="frecuencia" required>
                                    <option value="mensual">Mensual</option>
                                    <option value="trimestral">Trimestral</option>
                                    <option value="anual">Anual</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="dia_cargo" class="form-label">Día del Cargo</label>
                                <select class="form-select" id="dia_cargo" name="dia_cargo">
                                    {% for dia in range(1, 32) %}
                                    <option value="{{ dia }}" {% if dia == 1 %}selected{% endif %}>{{ dia }}</option>
                                    {% endfor %}
                                </select>
                                <div class="form-text">Día del mes en que se produce el gasto</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="fecha_inicio" class="form-label">Fecha de Inicio *</label>
                                <input type="date" class="form-control" id="fecha_inicio" name="fecha_inicio" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="fecha_fin" class="form-label">Fecha de Fin (Opcional)</label>
                        <input type="date" class="form-control" id="fecha_fin" name="fecha_fin">
                        <div class="form-text">Dejar vacío si el gasto es indefinido</div>
                    </div>

                    <div class="mb-3">
                        <label for="notas" class="form-label">Notas</label>
                        <textarea class="form-control" id="notas" name="notas" rows="3" 
                                  placeholder="Información adicional sobre este gasto..."></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('gastos_fijos') }}" class="btn btn-secondary me-md-2">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Gasto Fijo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Establecer fecha de hoy como fecha de inicio por defecto
document.getElementById('fecha_inicio').value = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
