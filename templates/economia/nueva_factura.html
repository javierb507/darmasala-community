{% extends "base.html" %}

{% block title %}Nueva Factura - Atma suddhi{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-file-invoice"></i> Nueva Factura</h2>
            <a href="{{ url_for('facturas') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Volver a Facturas
            </a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Datos de la Factura</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="numero_factura" class="form-label">Número de Factura *</label>
                                <input type="text" class="form-control" id="numero_factura" name="numero_factura" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="proveedor_id" class="form-label">Proveedor *</label>
                                <select class="form-select" id="proveedor_id" name="proveedor_id" required>
                                    <option value="">Seleccionar proveedor...</option>
                                    {% for proveedor in proveedores %}
                                    <option value="{{ proveedor.id }}">{{ proveedor.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="fecha_factura" class="form-label">Fecha de Factura *</label>
                                <input type="date" class="form-control" id="fecha_factura" name="fecha_factura" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="fecha_vencimiento" class="form-label">Fecha de Vencimiento</label>
                                <input type="date" class="form-control" id="fecha_vencimiento" name="fecha_vencimiento">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="categoria_id" class="form-label">Categoría *</label>
                                <select class="form-select" id="categoria_id" name="categoria_id" required>
                                    <option value="">Seleccionar categoría...</option>
                                    {% for categoria in categorias %}
                                    <option value="{{ categoria.id }}">{{ categoria.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="importe_sin_iva" class="form-label">Importe sin IVA *</label>
                                <div class="input-group">
                                    <input type="number" step="0.01" class="form-control" id="importe_sin_iva" name="importe_sin_iva" required>
                                    <span class="input-group-text">€</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="iva" class="form-label">IVA (%)</label>
                                <input type="number" step="0.01" class="form-control" id="iva" name="iva" value="21.0">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="importe_total" class="form-label">Importe Total</label>
                                <div class="input-group">
                                    <input type="number" step="0.01" class="form-control" id="importe_total" name="importe_total" readonly>
                                    <span class="input-group-text">€</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="3"></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('facturas') }}" class="btn btn-secondary me-md-2">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Factura
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Calcular total automáticamente
document.getElementById('importe_sin_iva').addEventListener('input', calcularTotal);
document.getElementById('iva').addEventListener('input', calcularTotal);

function calcularTotal() {
    const sinIva = parseFloat(document.getElementById('importe_sin_iva').value) || 0;
    const iva = parseFloat(document.getElementById('iva').value) || 0;
    const total = sinIva * (1 + iva / 100);
    document.getElementById('importe_total').value = total.toFixed(2);
}
</script>
{% endblock %}
