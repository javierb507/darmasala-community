{% extends "base.html" %}

{% block title %}Nueva Clase Personal - Atma suddhi{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-user-graduate"></i> Nueva Clase Personal</h2>
            <a href="{{ url_for('ver_alumno', alumno_id=alumno.id) }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Clase Personal - {{ alumno.nombre }} {{ alumno.apellido }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="fecha_clase" class="form-label">Fecha *</label>
                                <input type="date" class="form-control" id="fecha_clase" name="fecha_clase" 
                                       value="{{ date.today().isoformat() }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="duracion_minutos" class="form-label">Duración</label>
                                <select class="form-select" id="duracion_minutos" name="duracion_minutos">
                                    <option value="60" selected>60 minutos</option>
                                    <option value="75">75 minutos</option>
                                    <option value="90">90 minutos</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="tipo_sesion" class="form-label">Tipo</label>
                                <select class="form-select" id="tipo_sesion" name="tipo_sesion">
                                    <option value="individual">Individual</option>
                                    <option value="pareja">En pareja</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="precio" class="form-label">Precio</label>
                                <div class="input-group">
                                    <input type="number" step="0.01" class="form-control" id="precio" name="precio" 
                                           value="50.00" required>
                                    <span class="input-group-text">€</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="objetivos" class="form-label">Objetivos</label>
                        <textarea class="form-control" id="objetivos" name="objetivos" rows="2" 
                                  placeholder="¿Qué trabajar en esta sesión?"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="desarrollo" class="form-label">Desarrollo</label>
                        <textarea class="form-control" id="desarrollo" name="desarrollo" rows="3" 
                                  placeholder="Cómo se desarrolló la clase..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="observaciones" class="form-label">Observaciones</label>
                        <textarea class="form-control" id="observaciones" name="observaciones" rows="2" 
                                  placeholder="Observaciones del instructor..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="metodo_pago" class="form-label">Método de Pago</label>
                                <select class="form-select" id="metodo_pago" name="metodo_pago">
                                    <option value="">Pendiente de pago</option>
                                    <option value="efectivo">Efectivo</option>
                                    <option value="transferencia">Transferencia</option>
                                    <option value="tarjeta">Tarjeta</option>
                                    <option value="bizum">Bizum</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="pagado" name="pagado">
                                    <label class="form-check-label" for="pagado">
                                        Sesión pagada
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('ver_alumno', alumno_id=alumno.id) }}" class="btn btn-secondary me-md-2">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Calcular precio según tipo de sesión
document.getElementById('tipo_sesion').addEventListener('change', function() {
    const precios = {
        'individual': 50.00,
        'pareja': 70.00
    };
    
    const precio = precios[this.value] || 50.00;
    document.getElementById('precio').value = precio.toFixed(2);
});

// Auto-marcar pagado si se selecciona método
document.getElementById('metodo_pago').addEventListener('change', function() {
    if (this.value) {
        document.getElementById('pagado').checked = true;
    }
});
</script>
{% endblock %}
