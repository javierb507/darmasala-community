{% extends "base.html" %}

{% block title %}Editar {{ alumno.nombre }} {{ alumno.apellido }} - Atma suddhi{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-edit"></i> Editar Alumno: {{ alumno.nombre }} {{ alumno.apellido }}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">Nombre *</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" 
                                   value="{{ alumno.nombre }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="apellido" class="form-label">Apellido *</label>
                            <input type="text" class="form-control" id="apellido" name="apellido" 
                                   value="{{ alumno.apellido }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="dni" class="form-label">DNI/NIE</label>
                            <input type="text" class="form-control" id="dni" name="dni"
                                   value="{{ alumno.dni or '' }}" placeholder="12345678A">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ alumno.email }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="telefono" class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" id="telefono" name="telefono"
                                   value="{{ alumno.telefono or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="fecha_nacimiento" class="form-label">Fecha de Nacimiento</label>
                            <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento"
                                   value="{{ alumno.fecha_nacimiento.strftime('%Y-%m-%d') if alumno.fecha_nacimiento else '' }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="direccion" class="form-label">Dirección</label>
                        <textarea class="form-control" id="direccion" name="direccion" rows="3">{{ alumno.direccion or '' }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="tipo_cuota" class="form-label">Tipo de Cuota *</label>
                        <select class="form-select" id="tipo_cuota" name="tipo_cuota" required>
                            <option value="1_clase" {% if alumno.tipo_cuota == '1_clase' %}selected{% endif %}>1 clase por semana</option>
                            <option value="2_clases" {% if alumno.tipo_cuota == '2_clases' %}selected{% endif %}>2 clases por semana</option>
                            <option value="3_clases" {% if alumno.tipo_cuota == '3_clases' %}selected{% endif %}>3 clases por semana</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="condiciones_medicas" class="form-label">Condiciones Médicas</label>
                        <textarea class="form-control" id="condiciones_medicas" name="condiciones_medicas" rows="3" 
                                  placeholder="Por favor, lista cualquier condición médica o lesión que los instructores deban conocer...">{{ alumno.condiciones_medicas or '' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('ver_alumno', alumno_id=alumno.id) }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Actualizar Alumno
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
