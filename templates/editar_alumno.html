{% extends "base.html" %}

{% block title %}Editar Alumno - {{ alumno.nombre }} {{ alumno.apellido }} - Atma suddhi{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h4><i class="fas fa-user-edit"></i> Editar Alumno - {{ alumno.nombre }} {{ alumno.apellido }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="nombre" class="form-label">Nombre *</label>
                                    <input type="text" class="form-control" id="nombre" name="nombre" value="{{ alumno.nombre }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="apellido" class="form-label">Apellido *</label>
                                    <input type="text" class="form-control" id="apellido" name="apellido" value="{{ alumno.apellido }}" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email *</label>
                                    <input type="email" class="form-control" id="email" name="email" value="{{ alumno.email }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="telefono" class="form-label">Teléfono</label>
                                    <input type="tel" class="form-control" id="telefono" name="telefono" value="{{ alumno.telefono or '' }}">
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="fecha_nacimiento" class="form-label">Fecha de Nacimiento</label>
                                    <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" 
                                           value="{{ alumno.fecha_nacimiento.isoformat() if alumno.fecha_nacimiento else '' }}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="tipo_cuota" class="form-label">Tipo de Cuota</label>
                                    <select class="form-select" id="tipo_cuota" name="tipo_cuota">
                                        <option value="pendiente" {{ 'selected' if alumno.tipo_cuota == 'pendiente' else '' }}>Pendiente de asignación</option>
                                        {% if tipos_clase %}
                                            {% for tipo in tipos_clase %}
                                                <option value="{{ tipo.codigo }}" {{ 'selected' if alumno.tipo_cuota == tipo.codigo else '' }}>
                                                    {{ tipo.nombre }} ({{ tipo.get_precio_display() }})
                                                </option>
                                            {% endfor %}
                                        {% else %}
                                            <!-- Fallback si no hay tipos configurados -->
                                            <option value="clase_suelta" {{ 'selected' if alumno.tipo_cuota == 'clase_suelta' else '' }}>Clase suelta (15€/clase)</option>
                                            <option value="1_clase_semanal" {{ 'selected' if alumno.tipo_cuota == '1_clase_semanal' else '' }}>1 clase por semana (40€/mes)</option>
                                            <option value="2_clases_semanal" {{ 'selected' if alumno.tipo_cuota == '2_clases_semanal' else '' }}>2 clases por semana (70€/mes)</option>
                                            <option value="plana" {{ 'selected' if alumno.tipo_cuota == 'plana' else '' }}>Tarifa plana (90€/mes)</option>
                                            <option value="1_clase_bimensual" {{ 'selected' if alumno.tipo_cuota == '1_clase_bimensual' else '' }}>1 clase bimensual (75€/bimestre)</option>
                                            <option value="2_clases_bimensual" {{ 'selected' if alumno.tipo_cuota == '2_clases_bimensual' else '' }}>2 clases bimensual (135€/bimestre)</option>
                                        {% endif %}
                                    </select>
                                    <small class="form-text text-muted">
                                        <i class="fas fa-info-circle"></i> 
                                        Selecciona "Pendiente" si aún no has decidido el tipo de cuota.
                                    </small>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="direccion" class="form-label">Dirección</label>
                            <textarea class="form-control" id="direccion" name="direccion" rows="2">{{ alumno.direccion or '' }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="condiciones_medicas" class="form-label">Condiciones Médicas</label>
                            <textarea class="form-control" id="condiciones_medicas" name="condiciones_medicas" rows="2">{{ alumno.condiciones_medicas or '' }}</textarea>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('ver_alumno', alumno_id=alumno.id) }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
