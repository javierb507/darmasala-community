{% extends "base.html" %}

{% block title %}Calendario Simple - Atma suddhi{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2>Calendario Simple (Debug)</h2>
        <p><a href="/calendario">Volver al calendario normal</a></p>
        <div id="calendar"></div>
    </div>
</div>

<style>
.fc-col-header-cell {
    background: linear-gradient(135deg, #8B5FBF 0%, #6f4a99 100%) !important;
    border: none !important;
    padding: 12px 8px !important;
}

.fc-col-header-cell-cushion {
    color: white !important;
    text-decoration: none !important;
    font-weight: 600 !important;
}

.fc-timegrid-slot {
    height: 2.5em !important;
}
</style>

<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/locales/es.global.min.js'></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');

    const calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'es',
        initialView: 'timeGridWeek',
        firstDay: 1,
        slotMinTime: '09:00:00',
        slotMaxTime: '21:00:00',
        slotDuration: '00:30:00',
        height: 'auto',

        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'timeGridWeek,timeGridDay'
        },

        events: function(info, successCallback, failureCallback) {
            const url = `/api/calendario/eventos?start=${info.startStr}&end=${info.endStr}`;
            console.log('=== CALENDARIO SIMPLE DEBUG ===');
            console.log('URL:', url);
            console.log('Rango:', info.startStr, 'a', info.endStr);

            fetch(url)
                .then(response => {
                    console.log('Response status:', response.status);
                    console.log('Response headers:', response.headers);
                    return response.json();
                })
                .then(data => {
                    console.log('===== DATOS RECIBIDOS =====');
                    console.log('Total eventos:', data.length);
                    console.log('Eventos:', data);

                    // Transformar eventos para asegurar compatibilidad
                    const eventosTransformados = data.map(e => ({
                        id: e.id,
                        title: e.title,
                        start: e.start,
                        end: e.end,
                        backgroundColor: e.color,
                        borderColor: e.color,
                        extendedProps: {
                            tipo: e.tipo,
                            instructor: e.instructor,
                            horario_id: e.horario_id,
                            total_asistencias: e.total_asistencias,
                            presentes: e.presentes,
                            alumnos_presentes: e.alumnos_presentes,
                            alumnos_ausentes: e.alumnos_ausentes
                        }
                    }));

                    console.log('Eventos transformados:', eventosTransformados);
                    successCallback(eventosTransformados);
                })
                .catch(error => {
                    console.error('ERROR:', error);
                    failureCallback(error);
                });
        },

        eventDidMount: function(info) {
            console.log('Evento montado:', info.event.title);
        },

        eventClick: function(info) {
            alert('Evento: ' + info.event.title);
        }
    });

    calendar.render();
    console.log('Calendario renderizado');
});
</script>
{% endblock %}
