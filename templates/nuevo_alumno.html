{% extends "base.html" %}

{% block title %}Nuevo Alumno - Atma suddhi{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-user-plus"></i> Registrar Nuevo Alumno
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">Nombre *</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="apellido" class="form-label">Apellido *</label>
                            <input type="text" class="form-control" id="apellido" name="apellido" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telefono" class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" id="telefono" name="telefono">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="fecha_nacimiento" class="form-label">Fecha de Nacimiento</label>
                        <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento">
                    </div>
                    
                    <div class="mb-3">
                        <label for="direccion" class="form-label">Dirección</label>
                        <textarea class="form-control" id="direccion" name="direccion" rows="3"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="tipo_cuota" class="form-label">Tipo de Cuota *</label>
                        <select class="form-select" id="tipo_cuota" name="tipo_cuota" required>
                            <option value="clase_suelta">Clase suelta - €15.00</option>
                            <option value="1_clase_semanal">1 clase por semana - €40.00</option>
                            <option value="2_clases_semanal">2 clases por semana - €70.00</option>
                            <option value="plana">Tarifa plana - €90.00</option>
                            <option value="1_clase_bimensual">1 clase bimensual - €75.00</option>
                            <option value="2_clases_bimensual">2 clases bimensual - €135.00</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="matricula_pagada" name="matricula_pagada">
                            <label class="form-check-label" for="matricula_pagada">
                                <strong>Matrícula pagada</strong>
                            </label>
                        </div>
                        <div class="form-text">Marcar si el alumno ya pagó la matrícula anual</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="condiciones_medicas" class="form-label">Condiciones Médicas</label>
                        <textarea class="form-control" id="condiciones_medicas" name="condiciones_medicas" rows="3" 
                                  placeholder="Por favor, lista cualquier condición médica o lesión que los instructores deban conocer..."></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('alumnos') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Volver a Alumnos
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Registrar Alumno
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
