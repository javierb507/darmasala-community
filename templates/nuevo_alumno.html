{% extends "base.html" %}

{% block title %}Nuevo Alumno - Atma suddhi{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h4><i class="fas fa-user-plus"></i> Nuevo Alumno</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="nombre" class="form-label">Nombre *</label>
                                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="apellido" class="form-label">Apellido *</label>
                                    <input type="text" class="form-control" id="apellido" name="apellido" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email *</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="telefono" class="form-label">Teléfono</label>
                                    <input type="tel" class="form-control" id="telefono" name="telefono">
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="fecha_nacimiento" class="form-label">Fecha de Nacimiento</label>
                                    <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="tipo_cuota" class="form-label">Tipo de Cuota</label>
                                    <select class="form-select" id="tipo_cuota" name="tipo_cuota">
                                        <option value="pendiente" selected>Pendiente de asignación</option>
                                        {% if tipos_clase %}
                                            {% for tipo in tipos_clase %}
                                                <option value="{{ tipo.codigo }}">
                                                    {{ tipo.nombre }} ({{ tipo.get_precio_display() }})
                                                </option>
                                            {% endfor %}
                                        {% else %}
                                            <!-- Fallback si no hay tipos configurados -->
                                            <option value="clase_suelta">Clase suelta (15€/clase)</option>
                                            <option value="1_clase_semanal">1 clase por semana (40€/mes)</option>
                                            <option value="2_clases_semanal">2 clases por semana (70€/mes)</option>
                                            <option value="plana">Tarifa plana (90€/mes)</option>
                                            <option value="1_clase_bimensual">1 clase bimensual (75€/bimestre)</option>
                                            <option value="2_clases_bimensual">2 clases bimensual (135€/bimestre)</option>
                                        {% endif %}
                                    </select>
                                    <small class="form-text text-muted">
                                        <i class="fas fa-info-circle"></i> 
                                        Puedes dejar "Pendiente" si aún no has decidido el tipo de cuota y asignarlo más tarde.
                                    </small>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="direccion" class="form-label">Dirección</label>
                            <textarea class="form-control" id="direccion" name="direccion" rows="2"></textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="ciudad" class="form-label">Ciudad</label>
                                    <input type="text" class="form-control" id="ciudad" name="ciudad" value="Madrid">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="codigo_postal" class="form-label">Código Postal</label>
                                    <input type="text" class="form-control" id="codigo_postal" name="codigo_postal" placeholder="28001">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="pais" class="form-label">País</label>
                                    <input type="text" class="form-control" id="pais" name="pais" value="España">
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="numero_cuenta" class="form-label">Número de Cuenta (IBAN)</label>
                            <input type="text" class="form-control" id="numero_cuenta" name="numero_cuenta" placeholder="ES00 0000 0000 00 0000000000">
                        </div>
                        
                        <hr>
                        <h6 class="text-primary">Información Médica</h6>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="condiciones_medicas" class="form-label">Condiciones Médicas</label>
                                    <textarea class="form-control" id="condiciones_medicas" name="condiciones_medicas" rows="2" placeholder="Ej: Hipertensión, problemas de espalda..."></textarea>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="medicamentos" class="form-label">Medicamentos</label>
                                    <textarea class="form-control" id="medicamentos" name="medicamentos" rows="2" placeholder="Ej: Ibuprofeno ocasional, vitamina D..."></textarea>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="alergias" class="form-label">Alergias</label>
                                    <textarea class="form-control" id="alergias" name="alergias" rows="2" placeholder="Ej: Polen, frutos secos, látex..."></textarea>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="estado_fisico" class="form-label">Estado Físico</label>
                                    <textarea class="form-control" id="estado_fisico" name="estado_fisico" rows="2" placeholder="Ej: Buena forma física, sedentario, en recuperación..."></textarea>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="motivacion" class="form-label">Motivación para practicar yoga</label>
                            <textarea class="form-control" id="motivacion" name="motivacion" rows="3" placeholder="Ej: Reducir el estrés, mejorar flexibilidad, encontrar paz interior..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="matricula_pagada" name="matricula_pagada">
                                <label class="form-check-label" for="matricula_pagada">
                                    Matrícula pagada (25€)
                                </label>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('alumnos') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Guardar Alumno
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
