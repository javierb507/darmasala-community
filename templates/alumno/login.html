{% extends "alumno/layout.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold color-primary">Portal del Alumno</h2>
                    <p class="text-muted">Inicia sesión para reservar tus clases</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" id="email" required placeholder="tu@email.com">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Contraseña (DNI inicial)</label>
                        <input type="password" class="form-control" name="password" id="password" required placeholder="Tu NIF/NIE">
                        <div class="form-text mt-2">
                            <i class="fas fa-info-circle me-1"></i> La primera vez, utiliza tu DNI como contraseña.
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Entrar al Portal</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
