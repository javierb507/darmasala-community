{% extends "alumno/layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold mb-4">Mi Perfil</h2>
                
                <form method="POST">
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Nombre</label>
                            <input type="text" class="form-control-plaintext fw-bold" readonly value="{{ student.nombre }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Apellidos</label>
                            <input type="text" class="form-control-plaintext fw-bold" readonly value="{{ student.apellido }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control bg-light" id="email" readonly value="{{ student.email }}">
                        <p class="form-text small">Para cambiar tu email, por favor contacta con la recepción.</p>
                    </div>

                    <div class="mb-4">
                        <label for="telefono" class="form-label">Teléfono de Contacto</label>
                        <input type="text" class="form-control" name="telefono" id="telefono" value="{{ student.telefono or '' }}">
                    </div>

                    <div class="mb-4">
                        <label for="direccion" class="form-label">Dirección</label>
                        <textarea class="form-control" name="direccion" id="direccion" rows="2">{{ student.direccion or '' }}</textarea>
                    </div>

                    <hr class="my-5">

                    <h4 class="fw-bold mb-3">Cambiar Contraseña</h4>
                    <p class="text-muted small mb-4">Deja este campo vacío si no deseas cambiar tu contraseña actual.</p>

                    <div class="mb-4">
                        <label for="new_password" class="form-label">Nueva Contraseña</label>
                        <input type="password" class="form-control" name="new_password" id="new_password" placeholder="Mínimo 8 caracteres">
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-5">
                        <a href="{{ url_for('student_portal.dashboard') }}" class="text-decoration-none text-muted">Volver al calendario</a>
                        <button type="submit" class="btn btn-primary px-5">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
