<!DOCTYPE html>
<html>
<head>
    <title>Debug Calendario - Atma suddhi</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .evento { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .horario { background-color: #e3f2fd; }
        .individual { background-color: #f3e5f5; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Debug Calendario de Clases</h1>
    <p><a href="/calendario">Volver al Calendario</a></p>

    <h2>Información del Sistema</h2>
    <pre id="system-info"></pre>

    <h2>Horarios Semanales</h2>
    <div id="horarios"></div>

    <h2>Eventos API (Próximos 7 días)</h2>
    <div id="eventos"></div>

    <script>
        // Info del sistema
        const now = new Date();
        document.getElementById('system-info').textContent = `
Fecha/Hora actual: ${now.toLocaleString('es-ES')}
Día de la semana: ${now.toLocaleDateString('es-ES', {weekday: 'long'})}
ISO: ${now.toISOString()}
        `;

        // Cargar horarios
        fetch('/api/horarios')
            .then(r => r.json())
            .then(data => {
                const dias = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
                let html = '';
                data.forEach(h => {
                    html += `<div class="evento horario">
                        <strong>${h.clase_nombre}</strong><br>
                        ${dias[h.dia_semana]}: ${h.hora_inicio} - ${h.hora_fin}<br>
                        Instructor: ${h.instructor}
                    </div>`;
                });
                document.getElementById('horarios').innerHTML = html || '<p>No hay horarios</p>';
            })
            .catch(e => {
                document.getElementById('horarios').innerHTML = '<p style="color:red;">Error: ' + e + '</p>';
            });

        // Cargar eventos
        const start = new Date();
        const end = new Date();
        end.setDate(end.getDate() + 7);

        fetch(`/api/calendario/eventos?start=${start.toISOString()}&end=${end.toISOString()}`)
            .then(r => r.json())
            .then(data => {
                let html = `<p><strong>${data.length} eventos encontrados</strong></p>`;
                data.forEach(e => {
                    const startDate = new Date(e.start);
                    html += `<div class="evento ${e.tipo}">
                        <strong>${e.title}</strong><br>
                        ${startDate.toLocaleString('es-ES')}<br>
                        Tipo: ${e.tipo || 'N/A'}<br>
                        ${e.total_asistencias ? `Asistencias: ${e.presentes}/${e.total_asistencias}` : ''}
                    </div>`;
                });
                document.getElementById('eventos').innerHTML = html;
            })
            .catch(e => {
                document.getElementById('eventos').innerHTML = '<p style="color:red;">Error: ' + e + '</p>';
            });
    </script>
</body>
</html>
